[build]
  command = "npm run build"
  publish = "dist"

# Bundled demo rooms (public/demos/*) are their own static SPAs — serve their files
# directly so the catch-all below never rewrites them to the portfolio's index.html.
[[redirects]]
  from = "/demos/*"
  to = "/demos/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
